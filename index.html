<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المناداة الموحد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary:#0a4d8c; --accent:#f4a623; --bg:#f0f4fa; --card:#fff; --radius:12px; }
        body { font-family:'Cairo', sans-serif; background:var(--bg); direction: rtl; margin:0; }
        .app-header { background: var(--primary); color: #fff; padding: 15px; text-align: center; }
        .nav-tabs { display: flex; background: #fff; border-bottom: 1px solid #ddd; justify-content: center; }
        .nav-tab { padding: 15px 25px; cursor: pointer; font-weight: 600; }
        .nav-tab.active { color: var(--primary); border-bottom: 4px solid var(--primary); }
        .screen { padding: 20px; max-width: 800px; margin: 0 auto; }
        .view-content { display: none; }
        .view-content.active { display: block; }
        .card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { padding: 12px; border-radius: 8px; border: none; cursor: pointer; width: 100%; font-weight: bold; background: var(--primary); color: white; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; font-family: inherit; }
        .status-banner { padding: 10px; text-align: center; font-weight: bold; border-radius: 8px; margin-bottom: 15px; }
        .request-item { background: #fff; padding: 15px; border-radius: 10px; border-right: 5px solid var(--accent); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { text-align: center; padding: 15px; border-radius: 10px; color: white; }
        .class-checkbox { display: inline-block; margin: 5px; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

<header class="app-header">
    <h2 style="margin:0;">نظام المناداة الموحد 🏫</h2>
</header>

<nav class="nav-tabs">
    <div class="nav-tab active" onclick="showScreen('parent')">ولي الأمر</div>
    <div class="nav-tab" onclick="showScreen('teacher')">المعلم</div>
    <div class="nav-tab" onclick="showScreen('admin')">الإدارة</div>
</nav>

<main class="screen">
    <div id="system-status-msg" class="status-banner">جاري التحقق...</div>

    <div id="parent-screen" class="view-content active">
        <div id="p-login-box" class="card">
            <h3>دخول ولي الأمر</h3>
            <input type="text" id="parentQID" placeholder="أدخل الرقم الشخصي لولي الأمر">
            <button class="btn" onclick="parentLogin()">دخول</button>
        </div>
        <div id="p-portal" style="display:none;" class="card">
            <h3 id="p-welcome"></h3>
            <div id="children-container"></div>
        </div>
    </div>

    <div id="teacher-screen" class="view-content">
        <div id="t-login-box" class="card">
            <h3>دخول المعلم</h3>
            <input type="text" id="teacherUser" placeholder="اسم المستخدم (Username)">
            <button class="btn" onclick="teacherLogin()">دخول</button>
        </div>
        <div id="t-class-selection" style="display:none;" class="card">
            <h3>اختر الصفوف التي تتابعها حالياً:</h3>
            <div id="class-options"></div>
            <button class="btn" style="margin-top:10px;" onclick="startTeacherMonitor()">بدء المراقبة</button>
        </div>
        <div id="t-portal" style="display:none;">
            <div class="card" style="background:var(--primary); color:white;"><h3 id="t-welcome" style="margin:0;"></h3></div>
            <div id="t-list" class="card"><h4>طلبات المناداة:</h4></div>
            <button class="btn" style="background:#666;" onclick="location.reload()">تغيير الصفوف / خروج</button>
        </div>
    </div>

    <div id="admin-screen" class="view-content">
        <div id="a-login-box" class="card">
            <h3>دخول الإدارة</h3>
            <input type="text" id="adminUser" placeholder="admin">
            <input type="password" id="adminPass" placeholder="admin123">
            <button class="btn" onclick="adminLogin()">دخول</button>
        </div>
        <div id="a-portal" style="display:none;">
            <div class="stats-grid">
                <div class="stat-box" style="background:#0a4d8c;"><h6>الكلية</h6><h2 id="stat-total">0</h2></div>
                <div class="stat-box" style="background:#f4a623;"><h6>انتظار</h6><h2 id="stat-pending">0</h2></div>
                <div class="stat-box" style="background:#1db87e;"><h6>تم</h6><h2 id="stat-done">0</h2></div>
            </div>
            <div class="card">
                <h4>التحكم بالنظام</h4>
                <button id="toggle-btn" class="btn" onclick="toggleSystem()">تغيير حالة النظام</button>
            </div>
            <div class="card">
                <h4>رفع البيانات</h4>
                <label>الطلاب:</label><input type="file" onchange="uploadData('students', event)">
                <label>المعلمين:</label><input type="file" onchange="uploadData('teachers', event)">
            </div>
        </div>
    </div>
</main>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDp7O3d3cNUMcdimLmocHvIvUsRJw_v2EQ",
        authDomain: "student-dismiss.firebaseapp.com",
        databaseURL: "https://student-dismiss-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "student-dismiss",
        storageBucket: "student-dismiss.firebasestorage.app",
        messagingSenderId: "405450521674",
        appId: "1:405450521674:web:b24a19f049664613233ab3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isSystemOpen = true;
    let selectedClasses = [];

    // --- نظام التحكم ---
    function checkStatus() {
        const now = new Date();
        const time = now.getHours() * 60 + now.getMinutes();
        const isOpen = (time >= 690 && time <= 840); // 11:30 - 14:00
        
        db.ref('system_control/manual').on('value', snap => {
            const manual = snap.val();
            isSystemOpen = (manual !== null) ? manual : isOpen;
            const banner = document.getElementById('system-status-msg');
            banner.innerText = isSystemOpen ? "• النظام متاح الآن لاستقبال الطلبات" : "○ النظام مغلق حالياً";
            banner.style.background = isSystemOpen ? "#d1fae5" : "#fee2e2";
        });
    }

    // --- ولي الأمر ---
    function parentLogin() {
        if(!isSystemOpen) return alert("النظام مغلق");
        const qid = document.getElementById('parentQID').value.trim();
        db.ref('school_config/students').once('value', s => {
            const data = s.val() || [];
            // البحث بمرونة عن الرقم الشخصي في أي عمود يحتوي على QID
            const kids = Object.values(data).filter(k => {
                const val = k.QID_ولي_الأمر || k.qid || k.QID || k['الرقم الشخصي'];
                return String(val).trim() === qid;
            });

            if(kids.length > 0) {
                document.getElementById('p-login-box').style.display='none';
                document.getElementById('p-portal').style.display='block';
                document.getElementById('p-welcome').innerText = "مرحباً بك";
                const container = document.getElementById('children-container');
                container.innerHTML = "";
                kids.forEach(k => {
                    const name = k.اسم_الطالب || k.name || k.Name;
                    const cls = k.صف || k.class || k.Class;
                    container.innerHTML += `<div class="child-card" onclick="sendCall('${name}', '${cls}')">${name} (${cls}) <span>نداء ←</span></div>`;
                });
            } else { alert("الرقم الشخصي غير مسجل. تأكد من رفعه في ملف الطلاب بالاسم الصحيح."); }
        });
    }

    function sendCall(name, cls) {
        db.ref('live_calls/' + cls).push({name, cls, ts: Date.now()});
        alert("تم إرسال النداء");
    }

    // --- المعلم ---
    function teacherLogin() {
        const user = document.getElementById('teacherUser').value.trim().toLowerCase();
        db.ref('school_config/teachers').once('value', s => {
            const data = s.val() || [];
            const t = Object.values(data).find(i => String(i.username || i.Username || i.user).toLowerCase().trim() === user);
            if(t) {
                document.getElementById('t-login-box').style.display='none';
                document.getElementById('t-class-selection').style.display='block';
                document.getElementById('t-welcome').innerText = "الأستاذ: " + (t.name || t.اسم_المعلم);
                
                const classes = String(t.صفوف || t.الصفوف || t.class).split(',');
                const options = document.getElementById('class-options');
                options.innerHTML = "";
                classes.forEach(c => {
                    options.innerHTML += `<label class="class-checkbox"><input type="checkbox" value="${c.trim()}"> ${c.trim()}</label>`;
                });
            } else { alert("المعلم غير موجود"); }
        });
    }

    function startTeacherMonitor() {
        const checks = document.querySelectorAll('#class-options input:checked');
        if(checks.length === 0) return alert("اختر صفاً واحداً على الأقل");
        
        selectedClasses = Array.from(checks).map(c => c.value);
        document.getElementById('t-class-selection').style.display='none';
        document.getElementById('t-portal').style.display='block';

        selectedClasses.forEach(cls => {
            db.ref('live_calls/' + cls).on('value', snap => {
                if(snap.exists()) document.getElementById('notifSound').play();
                renderTeacherList();
            });
        });
    }

    function renderTeacherList() {
        const container = document.getElementById('t-list');
        container.innerHTML = "<h4>طلبات المناداة:</h4>";
        db.ref('live_calls').once('value', s => {
            const all = s.val() || {};
            selectedClasses.forEach(cls => {
                if(all[cls]) {
                    for(let id in all[cls]) {
                        const call = all[cls][id];
                        container.innerHTML += `<div class="request-item"><span>${call.name} (${cls})</span><button onclick="dismiss('${cls}','${id}')">تم الخروج</button></div>`;
                    }
                }
            });
        });
    }

    function dismiss(cls, id) {
        db.ref('live_calls/'+cls+'/'+id).once('value', snap => {
            db.ref('archive_calls').push({...snap.val(), done: true});
            db.ref('live_calls/'+cls+'/'+id).remove();
        });
    }

    // --- الإدارة ---
    function adminLogin() {
        if(document.getElementById('adminUser').value === 'admin' && document.getElementById('adminPass').value === 'admin123') {
            document.getElementById('a-login-box').style.display='none';
            document.getElementById('a-portal').style.display='block';
            updateStats();
        }
    }

    function updateStats() {
        db.ref('live_calls').on('value', s => {
            let p = 0; const d = s.val() || {};
            for(let c in d) p += Object.keys(d[c]).length;
            document.getElementById('stat-pending').innerText = p;
        });
        db.ref('archive_calls').on('value', s => {
            document.getElementById('stat-done').innerText = s.numChildren();
        });
    }

    function uploadData(type, event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            db.ref('school_config/' + type).set(json).then(() => alert("تم التحديث"));
        };
        reader.readAsArrayBuffer(file);
    }

    function showScreen(id) {
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id+'-screen').classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function toggleSystem() { db.ref('system_control/manual').set(!isSystemOpen); }

    checkStatus();
    setInterval(checkStatus, 60000);
</script>
</body>
</html>
